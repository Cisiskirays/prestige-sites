<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Factory | Site Üretim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a28;
            --border: rgba(255,255,255,0.06);
            --border-focus: rgba(14,165,233,0.5);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #0ea5e9;
            --accent-glow: rgba(14,165,233,0.15);
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.15);
            --red: #ef4444;
            --amber: #f59e0b;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BG Grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Glow orb */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 0 30px rgba(14,165,233,0.2);
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-text p {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .badge {
            margin-left: auto;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .badge-live { background: var(--green-glow); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Main form card */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 32px;
        }

        .form-card h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-card .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full { grid-column: 1 / -1; }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }

        .form-group select { cursor: pointer; }
        .form-group select option { background: var(--surface2); color: var(--text); }

        .form-group textarea { resize: vertical; min-height: 80px; }

        /* Submit */
        .submit-area {
            margin-top: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--accent), #0284c7);
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(14,165,233,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit.loading {
            pointer-events: none;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .status-text.success { color: var(--green); }
        .status-text.error { color: var(--red); }

        /* Log */
        .log-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
        }

        .log-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-entries {
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 2;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .log-entry:last-child { border-bottom: none; }

        .log-time { color: var(--text-dim); min-width: 60px; }
        .log-status { min-width: 18px; }
        .log-dot { width: 8px; height: 8px; border-radius: 50%; }
        .log-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
        .log-dot.pending { background: var(--amber); }
        .log-dot.fail { background: var(--red); }
        .log-msg { color: var(--text); }
        .log-link { color: var(--accent); text-decoration: none; }
        .log-link:hover { text-decoration: underline; }

        .empty-log {
            color: var(--text-dim);
            font-style: italic;
            text-align: center;
            padding: 40px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .form-grid { grid-template-columns: 1fr; }
            .form-card { padding: 24px; }
            .header { flex-wrap: wrap; }
            .badge { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-icon">P</div>
            <div class="header-text">
                <h1>Prestige Factory</h1>
                <p>Galzura Digital — Site Üretim Paneli</p>
            </div>
            <div class="badge badge-live">● SİSTEM AKTİF</div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="number" id="totalSites">0</div>
                <div class="label">Üretilen Site</div>
            </div>
            <div class="stat-card">
                <div class="number" id="todaySites">0</div>
                <div class="label">Bugün</div>
            </div>
            <div class="stat-card">
                <div class="number" id="queueCount">0</div>
                <div class="label">Kuyrukta</div>
            </div>
            <div class="stat-card">
                <div class="number" id="successRate">100%</div>
                <div class="label">Başarı Oranı</div>
            </div>
        </div>

        <!-- Form -->
        <div class="form-card">
            <h2>Yeni Site Üret</h2>
            <p class="subtitle">Google Maps linkini yapıştır, gerisini sistem halletsin.</p>

            <div class="form-grid">
                <div class="form-group full">
                    <label>Google Maps URL *</label>
                    <input type="url" id="mapsUrl" placeholder="https://maps.app.goo.gl/..." required>
                </div>

                <div class="form-group">
                    <label>Firma Adı (opsiyonel)</label>
                    <input type="text" id="firmaAdi" placeholder="Otomatik algılanır">
                </div>

                <div class="form-group">
                    <label>Sektör Override (opsiyonel)</label>
                    <select id="sektor">
                        <option value="">Otomatik Algıla</option>
                        <optgroup label="Sağlık">
                            <option value="Diş Hekimi">Diş Kliniği</option>
                            <option value="Estetik Kliniği">Estetik Kliniği</option>
                            <option value="Göz Kliniği">Göz Kliniği</option>
                            <option value="Fizyoterapi">Fizyoterapi</option>
                            <option value="Veteriner">Veteriner</option>
                            <option value="Eczane">Eczane</option>
                        </optgroup>
                        <optgroup label="Hizmet">
                            <option value="Avukat">Hukuk Bürosu</option>
                            <option value="Muhasebe">Muhasebe</option>
                            <option value="Danışmanlık">Danışmanlık</option>
                            <option value="Sigorta">Sigorta</option>
                            <option value="Emlak">Emlak</option>
                            <option value="Mimarlık">Mimarlık</option>
                        </optgroup>
                        <optgroup label="Yeme-İçme">
                            <option value="Restoran">Restoran</option>
                            <option value="Cafe">Cafe</option>
                            <option value="Pastane">Pastane</option>
                            <option value="Kasap">Kasap</option>
                            <option value="Fırın">Fırın</option>
                        </optgroup>
                        <optgroup label="Konaklama">
                            <option value="Otel">Otel</option>
                            <option value="Apart">Apart</option>
                            <option value="Tur Acentesi">Tur Acentesi</option>
                        </optgroup>
                        <optgroup label="Otomotiv">
                            <option value="Oto Servis">Oto Servis</option>
                            <option value="Yedek Parça">Yedek Parça</option>
                            <option value="Oto Yıkama">Oto Yıkama</option>
                            <option value="Oto Kiralama">Oto Kiralama</option>
                            <option value="Oto Galeri">Oto Galeri</option>
                        </optgroup>
                        <optgroup label="İnşaat-Teknik">
                            <option value="İnşaat">İnşaat</option>
                            <option value="Tadilat">Tadilat</option>
                            <option value="Vinç Kiralama">Vinç Kiralama</option>
                            <option value="Nakliyat">Nakliyat</option>
                            <option value="Dekorasyon">Dekorasyon</option>
                        </optgroup>
                        <optgroup label="Eğitim">
                            <option value="Kreş">Kreş</option>
                            <option value="Dershane">Dershane</option>
                            <option value="Dil Kursu">Dil Kursu</option>
                            <option value="Sürücü Kursu">Sürücü Kursu</option>
                            <option value="Spor Salonu">Spor Salonu</option>
                        </optgroup>
                        <optgroup label="Kişisel Bakım">
                            <option value="Kuaför">Kuaför</option>
                            <option value="Berber">Berber</option>
                            <option value="Spa">Spa</option>
                            <option value="Güzellik Merkezi">Güzellik Merkezi</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group full">
                    <label>Not (opsiyonel)</label>
                    <textarea id="not" placeholder="Özel istekler, ek bilgiler..."></textarea>
                </div>
            </div>

            <div class="submit-area">
                <button class="btn-submit" id="submitBtn" onclick="submitSite()">
                    Site Üretimini Başlat
                </button>
                <span class="status-text" id="statusText"></span>
            </div>
        </div>

        <!-- Log -->
        <div class="log-card">
            <h3>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M4 5h8M4 8h6M4 11h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Üretim Geçmişi
            </h3>
            <div class="log-entries" id="logEntries">
                <div class="empty-log">Henüz site üretilmedi. İlk siparişi ver!</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // WEBHOOK URL — BURAYI DEĞİŞTİR
        // ═══════════════════════════════════════
        const WEBHOOK_URL = 'https://volkanctk1.app.n8n.cloud/webhook/prestige-trigger';
        // ═══════════════════════════════════════

        let stats = JSON.parse(localStorage.getItem('prestigeStats') || '{"total":0,"today":0,"todayDate":"","queue":0,"success":0,"fail":0}');
        let logs = JSON.parse(localStorage.getItem('prestigeLogs') || '[]');

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            if (stats.todayDate !== today) {
                stats.today = 0;
                stats.todayDate = today;
            }
            document.getElementById('totalSites').textContent = stats.total;
            document.getElementById('todaySites').textContent = stats.today;
            document.getElementById('queueCount').textContent = stats.queue;
            const rate = stats.total > 0 ? Math.round((stats.success / stats.total) * 100) : 100;
            document.getElementById('successRate').textContent = rate + '%';
            localStorage.setItem('prestigeStats', JSON.stringify(stats));
        }

        function renderLogs() {
            const container = document.getElementById('logEntries');
            if (logs.length === 0) {
                container.innerHTML = '<div class="empty-log">Henüz site üretilmedi.</div>';
                return;
            }
            container.innerHTML = logs.slice().reverse().map(log => `
                <div class="log-entry">
                    <span class="log-time">${log.time}</span>
                    <span class="log-status"><span class="log-dot ${log.status}"></span></span>
                    <span class="log-msg">${log.firma}</span>
                    ${log.url ? `<a href="${log.url}" target="_blank" class="log-link">Siteyi Aç →</a>` : ''}
                </div>
            `).join('');
            localStorage.setItem('prestigeLogs', JSON.stringify(logs));
        }

        async function submitSite() {
            const mapsUrl = document.getElementById('mapsUrl').value.trim();
            if (!mapsUrl) {
                alert('Google Maps URL zorunlu!');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const statusText = document.getElementById('statusText');
            const firmaAdi = document.getElementById('firmaAdi').value.trim();
            const sektor = document.getElementById('sektor').value;
            const not = document.getElementById('not').value.trim();

            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = 'Üretiliyor...';
            statusText.textContent = 'Webhook tetikleniyor...';
            statusText.className = 'status-text';

            stats.queue++;
            updateStats();

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

            try {
                const payload = {
                    "Google Maps URL": mapsUrl,
                    "Firma Adı": firmaAdi || "Otomatik",
                    "Sektör": sektor || "Otomatik",
                    "Not": not
                };

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    stats.total++;
                    stats.today++;
                    stats.success++;
                    stats.queue = Math.max(0, stats.queue - 1);

                    logs.push({
                        time: timeStr,
                        firma: firmaAdi || mapsUrl.substring(0, 40) + '...',
                        status: 'ok',
                        url: ''
                    });

                    statusText.textContent = 'Tetiklendi! Site 2-3 dk içinde hazır olacak.';
                    statusText.className = 'status-text success';

                    // Formu temizle
                    document.getElementById('mapsUrl').value = '';
                    document.getElementById('firmaAdi').value = '';
                    document.getElementById('sektor').value = '';
                    document.getElementById('not').value = '';
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (err) {
                stats.fail++;
                stats.queue = Math.max(0, stats.queue - 1);

                logs.push({
                    time: timeStr,
                    firma: firmaAdi || 'Bilinmeyen',
                    status: 'fail',
                    url: ''
                });

                statusText.textContent = 'Hata: ' + err.message;
                statusText.className = 'status-text error';
            }

            btn.disabled = false;
            btn.classList.remove('loading');
            btn.textContent = 'Site Üretimini Başlat';
            updateStats();
            renderLogs();
        }

        // Init
        updateStats();
        renderLogs();
    </script>
</body>
</html>
